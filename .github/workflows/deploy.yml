name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase API key
        run: |
          sed 's|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g' \
            firebase-config.js > firebase-config.tmp.js
          mv firebase-config.tmp.js firebase-config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Collect web files
        run: |
          mkdir -p _site
          cp index.html app.js game-logic.js style.css firebase-config.js firebase-config.example.js favicon.svg _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
