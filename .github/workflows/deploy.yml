name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase API key
        run: |
          sed 's|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g' \
            firebase-config.js > firebase-config.tmp.js
          mv firebase-config.tmp.js firebase-config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,*.example.js,.gitignore'
