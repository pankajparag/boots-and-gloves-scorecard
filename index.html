<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boots & Gloves — Score Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#c0392b; --red-light:#fdecea; --red-dark:#922b21;
    --black:#1a1a2e; --black-light:#eaeaf2; --black-dark:#0d0d1a;
    --gold:#d4a017; --gold-light:#fdf6e3; --gold-dark:#9a7410;
    --green:#1a6b3a; --green-light:#e8f5ee; --green-dark:#0f3d21;
    --bg:#f7f5f0; --surface:#ffffff; --border:#e0ddd5;
    --text:#1a1a2e; --text-muted:#6b6b80; --text-light:#9999aa;
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  header{background:var(--black);color:white;padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
  header h1{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);}
  header p{font-size:.75rem;color:#aaa;font-family:'IBM Plex Mono',monospace;margin-top:2px;}
  .header-links{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
  .game-link{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:#ccc;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:5px;padding:4px 10px;text-decoration:none;transition:background .15s;white-space:nowrap;}
  .game-link:hover{background:rgba(255,255,255,.16);color:var(--gold);}
  .game-link.active{background:rgba(212,160,23,.18);border-color:var(--gold);color:var(--gold);}

  .setup-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:1.1rem 2rem;display:flex;gap:1.5rem;align-items:flex-end;flex-wrap:wrap;}
  .setup-panel label{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px;}
  .setup-panel select,.setup-panel input[type=number]{font-family:'IBM Plex Mono',monospace;font-size:.88rem;border:1px solid var(--border);border-radius:6px;padding:6px 10px;background:var(--bg);color:var(--text);outline:none;}
  .setup-panel select:focus,.setup-panel input:focus{border-color:var(--gold);}
  .btn{font-family:'IBM Plex Sans',sans-serif;font-size:.85rem;font-weight:500;padding:7px 16px;border-radius:6px;border:none;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--black);color:var(--gold);}
  .btn-primary:hover{background:var(--black-dark);}
  .btn-success{background:var(--green-light);color:var(--green-dark);border:1px solid #b8dfc8;}
  .btn-success:hover{background:#c8e9d6;}
  .btn-saved{background:#ddd;color:#888;border:1px solid #ccc;cursor:default;}
  .btn-edit{background:var(--gold-light);color:var(--gold-dark);border:1px solid #e8cc7a;font-size:.75rem;padding:4px 10px;}
  .btn-edit:hover{background:#f0db8a;}
  .btn-cancel{background:#f0ede6;color:var(--text-muted);border:1px solid var(--border);font-size:.75rem;padding:4px 10px;}

  .page{padding:1.5rem 2rem;max-width:1600px;margin:0 auto;}
  @media(max-width:700px){.page{padding:.75rem;}.setup-panel{padding:.75rem;gap:.75rem;}header{padding:1rem;}}

  .winner-banner{display:none;background:var(--green);color:white;text-align:center;padding:1.5rem;border-radius:var(--radius);font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:1.5rem;}
  .winner-banner.visible{display:block;}

  /* scoreboard */
  .scoreboard-wrap{margin-bottom:1.5rem;}
  .scoreboard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem;}
  .scoreboard-header{display:grid;background:var(--black);color:white;font-family:'IBM Plex Mono',monospace;font-size:.75rem;padding:.6rem 1rem;}
  .score-row{display:grid;padding:.45rem 1rem;border-bottom:1px solid var(--border);align-items:center;font-size:.85rem;}
  .score-row:last-child{border-bottom:none;}
  .score-row.totals-row{background:var(--gold-light);font-family:'IBM Plex Mono',monospace;font-weight:500;border-top:2px solid var(--gold);}
  .score-row.meld-row{background:#fafaf8;}
  .score-row.editable-row:hover{background:#f5f3ee;cursor:pointer;}
  .round-label{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--text-muted);display:flex;align-items:center;gap:6px;}
  .score-val{font-family:'IBM Plex Mono',monospace;font-size:.88rem;text-align:right;}
  .score-val.negative{color:var(--red);}
  .score-val.positive{color:var(--green);}
  .score-val.total{font-size:.95rem;font-weight:500;}
  .score-val.winner-col{background:var(--green-light);border-radius:4px;padding:1px 4px;}
  .meld-badge{font-size:.68rem;font-family:'IBM Plex Mono',monospace;background:var(--gold-light);color:var(--gold-dark);border:1px solid #e8cc7a;border-radius:4px;padding:1px 6px;display:inline-block;}

  /* history modal */
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;}
  .modal-backdrop.open{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:min(520px,95vw);max-height:85vh;overflow-y:auto;}
  .modal h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:1rem;}
  .modal-field{margin-bottom:.6rem;}
  .modal-field label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px;}
  .modal-field input{font-family:'IBM Plex Mono',monospace;font-size:.9rem;border:1px solid var(--border);border-radius:6px;padding:5px 8px;width:100%;background:var(--bg);outline:none;}
  .modal-field input:focus{border-color:var(--gold);}
  .modal-actions{display:flex;gap:.5rem;margin-top:1rem;justify-content:flex-end;}

  /* meld table */
  .meld-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .meld-table-title{background:var(--black);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:.72rem;padding:.5rem 1rem;letter-spacing:.05em;text-transform:uppercase;}
  .meld-table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:.78rem;}
  .meld-table th{background:#f0ede6;color:var(--text-muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;padding:5px 10px;text-align:left;border-bottom:1px solid var(--border);}
  .meld-table td{padding:5px 10px;border-bottom:1px solid var(--border);}
  .meld-table tr:last-child td{border-bottom:none;}
  .meld-table tr.active-row td{background:var(--gold-light);font-weight:500;color:var(--gold-dark);}

  /* entry columns */
  .entry-round-header{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid var(--border);}
  .entry-columns{display:grid;gap:1rem;}
  .entity-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;}
  .entity-col.col-saved{opacity:.7;}
  .entity-col-header{background:var(--black);color:white;padding:.6rem 1rem;}
  .entity-col-header .col-name{font-family:'Playfair Display',serif;font-size:.95rem;}
  .entity-col-header .col-players{font-size:.65rem;color:#aaa;margin-top:2px;}
  .entity-col-body{padding:.85rem;flex:1;display:flex;flex-direction:column;gap:.7rem;}

  .col-section-label{font-size:.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-bottom:.35rem;}

  .books-row{display:flex;gap:.5rem;}
  .book-field{flex:1;}
  .book-field label{font-size:.65rem;display:block;margin-bottom:3px;font-weight:500;}
  .book-field.red label{color:var(--red-dark);}
  .book-field.black label{color:#333;}
  .book-field.red input{width:100%;font-family:'IBM Plex Mono',monospace;font-size:.95rem;border:2px solid var(--red);border-radius:6px;padding:5px 7px;background:var(--red-light);color:var(--red-dark);outline:none;}
  .book-field.black input{width:100%;font-family:'IBM Plex Mono',monospace;font-size:.95rem;border:2px solid #555;border-radius:6px;padding:5px 7px;background:var(--black-light);color:#111;outline:none;}

  .went-out-section{background:var(--green-light);border:1px solid #b8dfc8;border-radius:7px;padding:.6rem .75rem;}
  .win-row-check{display:flex;align-items:center;gap:7px;padding:2px 0;}
  .win-row-check input[type=checkbox]{width:14px;height:14px;accent-color:var(--green);cursor:pointer;}
  .win-row-check label{font-size:.82rem;cursor:pointer;}

  .card-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
  .card-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
  .cf label,.neg-cf label{font-size:.62rem;color:var(--text-muted);display:block;margin-bottom:2px;}
  .cf input{width:100%;font-family:'IBM Plex Mono',monospace;font-size:.85rem;border:1px solid var(--border);border-radius:5px;padding:4px 5px;background:var(--bg);color:var(--text);outline:none;}
  .cf input:focus{border-color:var(--gold);background:var(--gold-light);}
  .neg-block{background:#fff8f7;border:1px solid #f5c6c2;border-radius:7px;padding:.65rem .75rem;}
  .neg-block .col-section-label{color:var(--red-dark);}
  .neg-cf input{width:100%;font-family:'IBM Plex Mono',monospace;font-size:.85rem;border:1px solid #f5c6c2;border-radius:5px;padding:4px 5px;background:#fff3f2;color:var(--red-dark);outline:none;}
  .neg-cf input:focus{border-color:var(--red);background:var(--red-light);}
  .neg-gone-out{font-size:.75rem;color:var(--green-dark);font-style:italic;padding:.25rem 0;}

  .col-preview{background:var(--gold-light);border:1px solid #e8cc7a;border-radius:7px;padding:.55rem .75rem;font-family:'IBM Plex Mono',monospace;font-size:.8rem;}
  .col-preview .prev-total{font-size:.95rem;font-weight:500;}
  .col-preview .prev-detail{font-size:.65rem;color:var(--text-muted);margin-top:2px;}

  .player-setup{display:flex;gap:.5rem;flex-wrap:wrap;}
  .player-label{display:flex;flex-direction:column;gap:2px;}
  .player-label span{font-size:.68rem;color:var(--text-muted);}
  .player-name-input{font-family:'IBM Plex Mono',monospace;font-size:.83rem;border:1px solid var(--border);border-radius:6px;padding:5px 8px;width:115px;background:var(--bg);}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:.88rem;}
  .empty-state .big{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--text-light);margin-bottom:.4rem;}
</style>
</head>
<body>

<header>
  <div>
    <h1>Boots &amp; Gloves</h1>
    <p>score card</p>
  </div>
  <div class="header-links">
    <span style="font-size:.7rem;color:#888;font-family:'IBM Plex Mono',monospace">Play online →</span>
    <a class="game-link" href="https://playingcards.io/dferem" target="_blank" id="link-ind3">Individual 3P</a>
    <a class="game-link" href="https://playingcards.io/utv8e9" target="_blank" id="link-team2v2">Team 2v2</a>
    <a class="game-link" href="https://playingcards.io/xv2w4e" target="_blank" id="link-team3v3">Team 3v3</a>
  </div>
</header>

<div class="setup-panel">
  <div>
    <label>Game mode</label>
    <select id="game-mode" onchange="onModeChange()">
      <option value="ind3">Individual — 3 players</option>
      <option value="team2v2">Team — 2 v 2</option>
      <option value="team3v3">Team — 3 v 3</option>
    </select>
  </div>
  <div id="player-names-setup" class="player-setup"></div>
  <div>
    <label>Win target (pts)</label>
    <input type="number" id="win-target" value="6000" step="500" min="1000" style="width:110px">
  </div>
  <div>
    <button class="btn btn-primary" onclick="startGame()">Start / Reset game</button>
  </div>
</div>

<!-- edit modal -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h3 id="modal-title">Edit Round</h3>
    <div id="modal-fields"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<div class="page">
  <div id="winner-banner" class="winner-banner"></div>
  <div class="scoreboard-wrap">
    <div class="scoreboard" id="scoreboard">
      <div class="empty-state"><div class="big">No game in progress</div>Set up players above and click Start</div>
    </div>
    <div class="meld-table-wrap" id="meld-table-wrap"></div>
  </div>
  <div id="entry-area" style="display:none">
    <div class="entry-round-header" id="round-header">Round 1</div>
    <div class="entry-columns" id="entry-columns"></div>
  </div>
</div>

<script>
// ── meld brackets ─────────────────────────────────────────────────────────────
const MELD_IND=[
  {label:'< 1,000',min:-Infinity,max:1000,meld:50},
  {label:'1,000 – 1,999',min:1000,max:2000,meld:90},
  {label:'2,000 – 2,999',min:2000,max:3000,meld:120},
  {label:'3,000 – 3,999',min:3000,max:4000,meld:150},
  {label:'4,000 – 4,999',min:4000,max:5000,meld:180},
  {label:'5,000 – 5,999',min:5000,max:6000,meld:210},
  {label:'≥ 6,000',min:6000,max:Infinity,meld:null,win:true}
];
const MELD_TEAM=[
  {label:'< 1,300',min:-Infinity,max:1300,meld:50},
  {label:'1,300 – 2,499',min:1300,max:2500,meld:90},
  {label:'2,500 – 4,599',min:2500,max:4600,meld:120},
  {label:'4,600 – 7,499',min:4600,max:7500,meld:150},
  {label:'7,500 – 8,999',min:7500,max:9000,meld:180},
  {label:'9,000 – 9,999',min:9000,max:10000,meld:210},
  {label:'≥ 10,000',min:10000,max:Infinity,meld:null,win:true}
];
function getBrackets(t){return t?MELD_TEAM:MELD_IND;}
function getMeld(score,isTeam){
  for(const b of getBrackets(isTeam)) if(score>=b.min&&score<b.max) return b.win?null:b.meld;
  return 210;
}
function isTeamMode(m){return m==='team2v2'||m==='team3v3';}

// ── game state ────────────────────────────────────────────────────────────────
// game.entities  — score units
// game.players   — individuals, each with entityIdx
// game.rounds    — [{round, scores:[...per entity], snapshots:{ei: {rb,bb,win,pos,neg}}}]
// game.pending   — current round's saved snapshots per entity {ei: scoreObj}
// game.submitted — which entity indices have hit Save this round
let game=null;

function buildGame(mode,target){
  const v=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  if(mode==='ind3'){
    const names=[v('name-P1')||'Player 1',v('name-P2')||'Player 2',v('name-P3')||'Player 3'];
    return{mode,isTeam:false,target,
      players:names.map((name,i)=>({name,entityIdx:i})),
      entities:names.map(name=>({name})),
      rounds:[],round:1,submitted:[],pending:{}};
  }
  if(mode==='team2v2'){
    const pl=[
      {name:v('name-T1P1')||'T1-P1',entityIdx:0},{name:v('name-T1P2')||'T1-P2',entityIdx:0},
      {name:v('name-T2P1')||'T2-P1',entityIdx:1},{name:v('name-T2P2')||'T2-P2',entityIdx:1}
    ];
    return{mode,isTeam:true,target,players:pl,
      entities:[{name:'Team 1',players:[pl[0].name,pl[1].name]},{name:'Team 2',players:[pl[2].name,pl[3].name]}],
      rounds:[],round:1,submitted:[],pending:{}};
  }
  if(mode==='team3v3'){
    const pl=[
      {name:v('name-T1P1')||'T1-P1',entityIdx:0},{name:v('name-T1P2')||'T1-P2',entityIdx:0},{name:v('name-T1P3')||'T1-P3',entityIdx:0},
      {name:v('name-T2P1')||'T2-P1',entityIdx:1},{name:v('name-T2P2')||'T2-P2',entityIdx:1},{name:v('name-T2P3')||'T2-P3',entityIdx:1}
    ];
    return{mode,isTeam:true,target,players:pl,
      entities:[{name:'Team 1',players:[pl[0].name,pl[1].name,pl[2].name]},{name:'Team 2',players:[pl[3].name,pl[4].name,pl[5].name]}],
      rounds:[],round:1,submitted:[],pending:{}};
  }
}

// ── helpers ───────────────────────────────────────────────────────────────────
function num(id){const el=document.getElementById(id);return el?(parseInt(el.value)||0):0;}
function chk(id){const el=document.getElementById(id);return el?el.checked:false;}
function setVal(id,v){const el=document.getElementById(id);if(el)el.value=v;}
function getTotals(){
  const t=game.entities.map(()=>0);
  for(const r of game.rounds) r.scores.forEach((s,i)=>t[i]+=s);
  return t;
}
function checkWinner(totals){
  for(let i=0;i<totals.length;i++) if(totals[i]>=game.target) return i;
  return -1;
}
function gridStyle(n){return `grid-template-columns:72px repeat(${n},1fr)`;}
function getOutPlayerIdx(){
  for(let i=0;i<game.players.length;i++) if(chk(`out-${i}`)) return i;
  return -1;
}

// ── setup UI ──────────────────────────────────────────────────────────────────
function onModeChange(){
  const mode=document.getElementById('game-mode').value;
  document.getElementById('win-target').value=isTeamMode(mode)?10000:6000;
  renderPlayerNameInputs();
  highlightActiveLink(mode);
}
function highlightActiveLink(mode){
  document.querySelectorAll('.game-link').forEach(a=>a.classList.remove('active'));
  const map={ind3:'link-ind3',team2v2:'link-team2v2',team3v3:'link-team3v3'};
  const el=document.getElementById(map[mode]);
  if(el) el.classList.add('active');
}
function renderPlayerNameInputs(){
  const mode=document.getElementById('game-mode').value;
  const container=document.getElementById('player-names-setup');
  container.innerHTML='';
  // Bug #3 fix: alternate team players T1-P1, T2-P1, T1-P2, T2-P2 ...
  const configs={
    ind3:[['P1','Player 1'],['P2','Player 2'],['P3','Player 3']],
    team2v2:[['T1P1','T1-P1'],['T2P1','T2-P1'],['T1P2','T1-P2'],['T2P2','T2-P2']],
    team3v3:[['T1P1','T1-P1'],['T2P1','T2-P1'],['T1P2','T1-P2'],['T2P2','T2-P2'],['T1P3','T1-P3'],['T2P3','T2-P3']]
  };
  for(const [id,placeholder] of configs[mode]){
    const wrap=document.createElement('div');
    wrap.className='player-label';
    wrap.innerHTML=`<span>${placeholder}</span><input class="player-name-input" id="name-${id}" placeholder="${placeholder}" value="${placeholder}">`;
    container.appendChild(wrap);
  }
}

function startGame(){
  const mode=document.getElementById('game-mode').value;
  const target=parseInt(document.getElementById('win-target').value)||6000;
  game=buildGame(mode,target);
  document.getElementById('winner-banner').classList.remove('visible');
  document.getElementById('entry-area').style.display='block';
  renderAll();
}

// ── scoreboard ────────────────────────────────────────────────────────────────
function renderScoreboard(){
  const {entities,rounds,isTeam}=game;
  const n=entities.length;
  let html=`<div class="scoreboard-header" style="${gridStyle(n)}">
    <div>Rd</div>
    ${entities.map(e=>`<div style="text-align:right">${e.name}${e.players?'<br><span style="font-size:.62rem;opacity:.55">'+e.players.join(' / ')+'</span>':''}</div>`).join('')}
  </div>`;
  if(rounds.length===0){
    html+=`<div class="empty-state"><div class="big">No rounds yet</div>Enter round 1 below</div>`;
  } else {
    const totals=entities.map(()=>0);
    for(const r of rounds){
      r.scores.forEach((s,i)=>totals[i]+=s);
      html+=`<div class="score-row editable-row" style="${gridStyle(n)}" onclick="openEditModal(${r.round-1})" title="Click to edit">
        <div class="round-label">R${r.round} <span style="font-size:.6rem;color:var(--gold-dark)">✎</span></div>
        ${r.scores.map(s=>`<div class="score-val ${s<0?'negative':''}">${s>=0?'+':''}${s}</div>`).join('')}
      </div>`;
    }
    const winner=checkWinner(totals);
    html+=`<div class="score-row totals-row" style="${gridStyle(n)}">
      <div class="round-label" style="font-weight:500">Total</div>
      ${totals.map((t,i)=>`<div class="score-val total ${t<0?'negative':'positive'} ${winner===i?'winner-col':''}">${t.toLocaleString()}</div>`).join('')}
    </div>`;
    html+=`<div class="score-row meld-row" style="${gridStyle(n)}">
      <div class="round-label">Meld</div>
      ${totals.map(t=>{const m=getMeld(t,isTeam);return`<div style="text-align:right"><span class="meld-badge">${m!==null?'≥ '+m:'🏆 win'}</span></div>`;}).join('')}
    </div>`;
  }
  document.getElementById('scoreboard').innerHTML=html;
}

function renderMeldTable(){
  const{isTeam}=game;
  const brackets=getBrackets(isTeam);
  const maxScore=Math.max(...getTotals(),0);
  let html=`<div class="meld-table-title">Meld thresholds — ${isTeam?'team':'individual'} game</div>
  <table class="meld-table"><thead><tr><th>Score range</th><th>Min. meld</th></tr></thead><tbody>`;
  for(const b of brackets){
    const active=maxScore>=b.min&&maxScore<b.max;
    html+=`<tr class="${active?'active-row':''}"><td>${b.label}</td><td>${b.win?'🏆 Win!':b.meld+' pts'}</td></tr>`;
  }
  html+=`</tbody></table>`;
  document.getElementById('meld-table-wrap').innerHTML=html;
}

// ── edit modal ────────────────────────────────────────────────────────────────
let editingRoundIdx=null;
function openEditModal(roundIdx){
  editingRoundIdx=roundIdx;
  const r=game.rounds[roundIdx];
  document.getElementById('modal-title').textContent=`Edit Round ${r.round}`;
  let html='';
  game.entities.forEach((e,ei)=>{
    html+=`<div style="margin-bottom:.75rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)">
      <div style="font-size:.75rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;margin-bottom:.4rem">${e.name}</div>
      <div class="modal-field"><label>Round score</label>
        <input type="number" id="edit-score-${ei}" value="${r.scores[ei]}">
      </div>
    </div>`;
  });
  document.getElementById('modal-fields').innerHTML=html;
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal(){
  document.getElementById('edit-modal').classList.remove('open');
  editingRoundIdx=null;
}
function saveEdit(){
  if(editingRoundIdx===null) return;
  game.entities.forEach((_,ei)=>{
    const val=parseInt(document.getElementById(`edit-score-${ei}`).value)||0;
    game.rounds[editingRoundIdx].scores[ei]=val;
  });
  closeModal();
  renderScoreboard();
  renderMeldTable();
}
document.getElementById('edit-modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// ── entry columns ─────────────────────────────────────────────────────────────
function renderEntryColumns(){
  const{entities,players,round,isTeam,submitted}=game;
  document.getElementById('round-header').textContent=`Round ${round}`;
  const cols=document.getElementById('entry-columns');
  cols.style.gridTemplateColumns=`repeat(${entities.length},1fr)`;

  cols.innerHTML=entities.map((e,ei)=>{
    const isSaved=submitted.includes(ei);
    const totals=getTotals();
    const curScore=totals[ei];
    const meld=getMeld(curScore,isTeam);

    // Players in this entity
    const myPlayers=players.map((p,pi)=>({...p,pi})).filter(p=>p.entityIdx===ei);

    const wentOutHtml=`<div class="went-out-section">
      <div class="col-section-label" style="color:var(--green-dark)">Who went out?</div>
      ${myPlayers.map(p=>`<div class="win-row-check">
        <input type="checkbox" id="out-${p.pi}" onchange="onOutChange(${p.pi})" ${isSaved?'disabled':''}>
        <label for="out-${p.pi}">${p.name}</label>
      </div>`).join('')}
    </div>`;

    const booksHtml=`<div>
      <div class="col-section-label">Books</div>
      <div class="books-row">
        <div class="book-field red"><label>🔴 Red ×500</label><input type="number" min="0" value="0" id="rb-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
        <div class="book-field black"><label>⚫ Black ×300</label><input type="number" min="0" value="0" id="bb-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
      </div>
    </div>`;

    const posHtml=`<div>
      <div class="col-section-label">Cards scored (+)</div>
      <div class="card-grid-2">
        <div class="cf"><label>Joker ×50</label><input type="number" min="0" value="0" id="pjoker-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
        <div class="cf"><label>2/Ace ×20</label><input type="number" min="0" value="0" id="pwild-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
        <div class="cf"><label>K–10 ×10</label><input type="number" min="0" value="0" id="pface-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
        <div class="cf"><label>9–4 ×5</label><input type="number" min="0" value="0" id="plow-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
      </div>
    </div>`;

    // Neg section — always shown; for individual mode, hide inputs if this entity went out
    const outPi=getOutPlayerIdx();
    const outEi=outPi>=0?players[outPi].entityIdx:-1;
    const isIndWinner=!isTeam&&ei===outEi;
    const negHtml=`<div class="neg-block">
      <div class="col-section-label">Leftover (−)</div>
      ${isIndWinner
        ?`<div class="neg-gone-out">Went out — no leftover</div>`
        :`<div class="card-grid-3">
          <div class="neg-cf"><label>Joker −50</label><input type="number" min="0" value="0" id="njoker-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
          <div class="neg-cf"><label>2/Ace −20</label><input type="number" min="0" value="0" id="nwild-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
          <div class="neg-cf"><label>K–10 −10</label><input type="number" min="0" value="0" id="nface-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
          <div class="neg-cf"><label>9–3 −5</label><input type="number" min="0" value="0" id="nlow-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
          <div class="neg-cf"><label>Red 3 −500</label><input type="number" min="0" value="0" id="nred3-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
          <div class="neg-cf"><label>Black 3 −5</label><input type="number" min="0" value="0" id="nblk3-${ei}" ${isSaved?'disabled':''} onchange="updateColPreview(${ei})"></div>
        </div>`
      }
    </div>`;

    const previewHtml=`<div class="col-preview" id="preview-${ei}">
      <div class="prev-total">—</div>
      <div class="prev-detail">Enter scores above</div>
    </div>`;

    const saveHtml=isSaved
      ?`<button class="btn btn-saved" style="width:100%" disabled>✓ Saved — ${e.name}</button>`
      :`<button class="btn btn-success" style="width:100%" onclick="commitEntity(${ei})">✓ Save — ${e.name}</button>`;

    const footerHtml=`<div style="font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--text-muted);text-align:center">
      ${curScore.toLocaleString()} pts · meld ≥ ${meld!==null?meld:'–'}
    </div>`;

    return`<div class="entity-col ${isSaved?'col-saved':''}">
      <div class="entity-col-header">
        <div class="col-name">${e.name}</div>
        ${e.players?`<div class="col-players">${e.players.join(' · ')}</div>`:''}
      </div>
      <div class="entity-col-body">
        ${wentOutHtml}
        ${booksHtml}
        ${posHtml}
        ${negHtml}
        ${previewHtml}
        <div style="margin-top:auto;display:flex;flex-direction:column;gap:.4rem">
          ${saveHtml}
          ${footerHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── out change: update state, then only patch neg sections + preview ──────────
// Bug #2 fix: do NOT re-render full columns — that destroys DOM and loses input values.
// Instead just update the neg section div and the "went out" checkboxes in other cols.
function onOutChange(clickedPi){
  // Uncheck all other out checkboxes without re-rendering
  game.players.forEach((_,pi)=>{
    if(pi!==clickedPi){const el=document.getElementById(`out-${pi}`);if(el) el.checked=false;}
  });
  // Patch each entity's neg section in place
  const outPi=getOutPlayerIdx();
  const outEi=outPi>=0?game.players[outPi].entityIdx:-1;
  game.entities.forEach((_,ei)=>{
    if(!game.isTeam){
      const negWrap=document.getElementById(`neg-wrap-${ei}`);
      if(negWrap){
        const isWinner=ei===outEi;
        negWrap.innerHTML=isWinner
          ?`<div class="neg-gone-out">Went out — no leftover</div>`
          :negInputsHtml(ei,game.submitted.includes(ei));
      }
    }
    updateColPreview(ei);
  });
}

function negInputsHtml(ei,disabled){
  const d=disabled?'disabled':'';
  return`<div class="card-grid-3">
    <div class="neg-cf"><label>Joker −50</label><input type="number" min="0" value="0" id="njoker-${ei}" ${d} onchange="updateColPreview(${ei})"></div>
    <div class="neg-cf"><label>2/Ace −20</label><input type="number" min="0" value="0" id="nwild-${ei}" ${d} onchange="updateColPreview(${ei})"></div>
    <div class="neg-cf"><label>K–10 −10</label><input type="number" min="0" value="0" id="nface-${ei}" ${d} onchange="updateColPreview(${ei})"></div>
    <div class="neg-cf"><label>9–3 −5</label><input type="number" min="0" value="0" id="nlow-${ei}" ${d} onchange="updateColPreview(${ei})"></div>
    <div class="neg-cf"><label>Red 3 −500</label><input type="number" min="0" value="0" id="nred3-${ei}" ${d} onchange="updateColPreview(${ei})"></div>
    <div class="neg-cf"><label>Black 3 −5</label><input type="number" min="0" value="0" id="nblk3-${ei}" ${d} onchange="updateColPreview(${ei})"></div>
  </div>`;
}

// Add neg-wrap divs to the neg-block after initial render so we can patch them
function addNegWraps(){
  game.entities.forEach((_,ei)=>{
    const block=document.getElementById(`neg-block-${ei}`);
    // already handled via id in the HTML template — we'll use a different approach:
    // wrap the inner content of neg-block with a div id="neg-wrap-{ei}"
  });
}

// ── score calc (reads live DOM) ───────────────────────────────────────────────
function calcEntityScore(ei){
  const outPi=getOutPlayerIdx();
  const outEi=outPi>=0?game.players[outPi].entityIdx:-1;
  const isIndWinner=!game.isTeam&&ei===outEi;
  const rb=num(`rb-${ei}`),bb=num(`bb-${ei}`);
  const win=(outPi>=0&&game.players[outPi].entityIdx===ei)?100:0;
  const pos=num(`pjoker-${ei}`)*50+num(`pwild-${ei}`)*20+num(`pface-${ei}`)*10+num(`plow-${ei}`)*5;
  const neg=isIndWinner?0:-(num(`njoker-${ei}`)*50+num(`nwild-${ei}`)*20+num(`nface-${ei}`)*10+num(`nlow-${ei}`)*5+num(`nred3-${ei}`)*500+num(`nblk3-${ei}`)*5);
  const books=rb*500+bb*300;
  return{books,win,pos,neg,total:books+win+pos+neg};
}

function updateColPreview(ei){
  const el=document.getElementById(`preview-${ei}`);
  if(!el) return;
  const s=calcEntityScore(ei);
  const after=getTotals()[ei]+s.total;
  const color=s.total<0?'var(--red)':'var(--green-dark)';
  el.innerHTML=`<div class="prev-total" style="color:${color}">${s.total>=0?'+':''}${s.total} <span style="font-size:.72rem;color:var(--text-muted);font-weight:400">→ ${after.toLocaleString()}</span></div>
    <div class="prev-detail">${s.books} bks · ${s.win} win · +${s.pos} cards · ${s.neg} left</div>`;
}

// ── commit ────────────────────────────────────────────────────────────────────
// Bug #1 fix: snapshot scores at the time each entity hits Save, so
// when the last entity saves we use the stored snapshots, not a re-read of
// potentially stale / cleared DOM inputs.
function commitEntity(ei){
  if(game.submitted.includes(ei)) return;
  // Snapshot this entity's score NOW while inputs are still live
  game.pending[ei]=calcEntityScore(ei).total;
  game.submitted.push(ei);

  if(game.submitted.length===game.entities.length){
    // All entities submitted — finalise round using snapshots
    const scores=game.entities.map((_,i)=>game.pending[i]);
    game.rounds.push({round:game.round,scores});
    game.round++;
    game.submitted=[];
    game.pending={};

    const totals=getTotals();
    const winner=checkWinner(totals);
    if(winner>=0){
      const banner=document.getElementById('winner-banner');
      banner.textContent=`🎉 ${game.entities[winner].name} wins with ${totals[winner].toLocaleString()} points!`;
      banner.classList.add('visible');
      document.getElementById('entry-area').style.display='none';
    } else {
      renderEntryColumns();
    }
    renderScoreboard();
    renderMeldTable();
    window.scrollTo(0,0);
  } else {
    // Grey out this column's save button and disable its inputs
    const saveBtn=document.querySelector(`[onclick="commitEntity(${ei})"]`);
    if(saveBtn){saveBtn.className='btn btn-saved';saveBtn.disabled=true;saveBtn.textContent=`✓ Saved — ${game.entities[ei].name}`;}
    // Disable all inputs in this column
    ['rb','bb','pjoker','pwild','pface','plow','njoker','nwild','nface','nlow','nred3','nblk3'].forEach(prefix=>{
      const inp=document.getElementById(`${prefix}-${ei}`);
      if(inp) inp.disabled=true;
    });
    // Also disable the out checkboxes for this entity's players
    game.players.forEach((p,pi)=>{
      if(p.entityIdx===ei){const el=document.getElementById(`out-${pi}`);if(el)el.disabled=true;}
    });
  }
}

// ── full render ───────────────────────────────────────────────────────────────
function renderAll(){
  renderScoreboard();
  renderMeldTable();
  renderEntryColumns();
}

renderPlayerNameInputs();
highlightActiveLink('ind3');
</script>
