<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boots & Gloves — Score Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b; --red-light: #fdecea; --red-dark: #922b21;
    --black: #1a1a2e; --black-light: #eaeaf2; --black-dark: #0d0d1a;
    --gold: #d4a017; --gold-light: #fdf6e3; --gold-dark: #9a7410;
    --green: #1a6b3a; --green-light: #e8f5ee; --green-dark: #0f3d21;
    --bg: #f7f5f0; --surface: #ffffff; --border: #e0ddd5;
    --text: #1a1a2e; --text-muted: #6b6b80; --text-light: #9999aa;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--black); color: white; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); }
  header p { font-size: 0.75rem; color: #aaa; font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
  .header-links { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .game-link { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: #ccc; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 5px; padding: 4px 10px; text-decoration: none; transition: background 0.15s; white-space: nowrap; }
  .game-link:hover { background: rgba(255,255,255,0.16); color: var(--gold); }
  .game-link.active { background: rgba(212,160,23,0.18); border-color: var(--gold); color: var(--gold); }

  .setup-panel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.1rem 2rem; display: flex; gap: 1.5rem; align-items: flex-end; flex-wrap: wrap; }
  .setup-panel label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  .setup-panel select, .setup-panel input[type=number] { font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; background: var(--bg); color: var(--text); outline: none; }
  .setup-panel select:focus, .setup-panel input:focus { border-color: var(--gold); }
  .btn { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.85rem; font-weight: 500; padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--black); color: var(--gold); }
  .btn-primary:hover { background: var(--black-dark); }
  .btn-success { background: var(--green-light); color: var(--green-dark); border: 1px solid #b8dfc8; }
  .btn-success:hover { background: #c8e9d6; }
  .btn-saved { background: #ddd; color: #888; border: 1px solid #ccc; cursor: default; }

  /* ── page layout ── */
  .page { padding: 1.5rem 2rem; max-width: 1600px; margin: 0 auto; }
  @media(max-width: 700px) { .page { padding: 0.75rem; } .setup-panel { padding: 0.75rem; gap: 0.75rem; } header { padding: 1rem; } }

  .winner-banner { display: none; background: var(--green); color: white; text-align: center; padding: 1.5rem; border-radius: var(--radius); font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 1.5rem; }
  .winner-banner.visible { display: block; }

  /* ── scoreboard + meld ── */
  .scoreboard-wrap { margin-bottom: 1.5rem; }
  .scoreboard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
  .scoreboard-header { display: grid; background: var(--black); color: white; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; padding: 0.6rem 1rem; }
  .score-row { display: grid; padding: 0.55rem 1rem; border-bottom: 1px solid var(--border); align-items: center; font-size: 0.85rem; }
  .score-row:last-child { border-bottom: none; }
  .score-row.totals-row { background: var(--gold-light); font-family: 'IBM Plex Mono', monospace; font-weight: 500; border-top: 2px solid var(--gold); }
  .score-row.meld-row { background: #fafaf8; }
  .round-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--text-muted); }
  .score-val { font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; text-align: right; }
  .score-val.negative { color: var(--red); }
  .score-val.positive { color: var(--green); }
  .score-val.total { font-size: 0.95rem; font-weight: 500; }
  .score-val.winner-col { background: var(--green-light); border-radius: 4px; padding: 1px 4px; }
  .meld-badge { font-size: 0.68rem; font-family: 'IBM Plex Mono', monospace; background: var(--gold-light); color: var(--gold-dark); border: 1px solid #e8cc7a; border-radius: 4px; padding: 1px 6px; display: inline-block; }

  .meld-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .meld-table-title { background: var(--black); color: var(--gold); font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; padding: 0.5rem 1rem; letter-spacing: 0.05em; text-transform: uppercase; }
  .meld-table { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; }
  .meld-table th { background: #f0ede6; color: var(--text-muted); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 5px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .meld-table td { padding: 5px 10px; border-bottom: 1px solid var(--border); }
  .meld-table tr:last-child td { border-bottom: none; }
  .meld-table tr.active-row td { background: var(--gold-light); font-weight: 500; color: var(--gold-dark); }

  /* ── entry columns ── */
  .entry-round-header { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--text); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
  .entry-columns { display: grid; gap: 1rem; }
  /* columns set dynamically via inline style */

  .entity-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; }
  .entity-col-header { background: var(--black); color: white; padding: 0.6rem 1rem; font-family: 'Playfair Display', serif; font-size: 0.95rem; }
  .entity-col-header .col-players { font-family: 'IBM Plex Sans', monospace; font-size: 0.65rem; color: #aaa; margin-top: 2px; }
  .entity-col-body { padding: 0.85rem; flex: 1; display: flex; flex-direction: column; gap: 0.75rem; }

  .col-section-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin-bottom: 0.4rem; }

  /* books */
  .books-row { display: flex; gap: 0.5rem; }
  .book-field { flex: 1; }
  .book-field label { font-size: 0.65rem; display: block; margin-bottom: 3px; font-weight: 500; }
  .book-field.red label { color: var(--red-dark); }
  .book-field.black label { color: #333; }
  .book-field.red input { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 0.95rem; border: 2px solid var(--red); border-radius: 6px; padding: 5px 7px; background: var(--red-light); color: var(--red-dark); outline: none; }
  .book-field.black input { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 0.95rem; border: 2px solid #555; border-radius: 6px; padding: 5px 7px; background: var(--black-light); color: #111; outline: none; }

  /* went out */
  .went-out-section { background: var(--green-light); border: 1px solid #b8dfc8; border-radius: 7px; padding: 0.6rem 0.75rem; }
  .win-row-check { display: flex; align-items: center; gap: 7px; padding: 2px 0; }
  .win-row-check input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--green); cursor: pointer; }
  .win-row-check label { font-size: 0.82rem; cursor: pointer; }

  /* card grids */
  .card-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .card-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .cf label { font-size: 0.62rem; color: var(--text-muted); display: block; margin-bottom: 2px; }
  .cf input { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 5px; padding: 4px 5px; background: var(--bg); color: var(--text); outline: none; }
  .cf input:focus { border-color: var(--gold); background: var(--gold-light); }

  /* negative section */
  .neg-block { background: #fff8f7; border: 1px solid #f5c6c2; border-radius: 7px; padding: 0.65rem 0.75rem; }
  .neg-block .col-section-label { color: var(--red-dark); }
  .neg-cf label { font-size: 0.62rem; color: #b07070; display: block; margin-bottom: 2px; }
  .neg-cf input { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; border: 1px solid #f5c6c2; border-radius: 5px; padding: 4px 5px; background: #fff3f2; color: var(--red-dark); outline: none; }
  .neg-cf input:focus { border-color: var(--red); background: var(--red-light); }
  .neg-gone-out { font-size: 0.75rem; color: var(--green-dark); font-style: italic; padding: 0.3rem 0; }

  /* round preview per col */
  .col-preview { background: var(--gold-light); border: 1px solid #e8cc7a; border-radius: 7px; padding: 0.6rem 0.75rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; }
  .col-preview .prev-total { font-size: 0.95rem; font-weight: 500; }
  .col-preview .prev-detail { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }

  .player-setup { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .player-label { display: flex; flex-direction: column; gap: 2px; }
  .player-label span { font-size: 0.68rem; color: var(--text-muted); }
  .player-name-input { font-family: 'IBM Plex Mono', monospace; font-size: 0.83rem; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; width: 115px; background: var(--bg); }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.88rem; }
  .empty-state .big { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--text-light); margin-bottom: 0.4rem; }
  .section-divider { border: none; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Boots &amp; Gloves</h1>
    <p>score card</p>
  </div>
  <div class="header-links">
    <span style="font-size:0.7rem;color:#888;font-family:'IBM Plex Mono',monospace">Play online →</span>
    <a class="game-link" href="https://playingcards.io/dferem" target="_blank" id="link-ind3">Individual 3P</a>
    <a class="game-link" href="https://playingcards.io/utv8e9" target="_blank" id="link-team2v2">Team 2v2</a>
    <a class="game-link" href="https://playingcards.io/xv2w4e" target="_blank" id="link-team3v3">Team 3v3</a>
  </div>
</header>

<div class="setup-panel">
  <div>
    <label>Game mode</label>
    <select id="game-mode" onchange="onModeChange()">
      <option value="ind3">Individual — 3 players</option>
      <option value="team2v2">Team — 2 v 2</option>
      <option value="team3v3">Team — 3 v 3</option>
    </select>
  </div>
  <div id="player-names-setup" class="player-setup"></div>
  <div>
    <label>Win target (pts)</label>
    <input type="number" id="win-target" value="6000" step="500" min="1000" style="width:110px">
  </div>
  <div>
    <button class="btn btn-primary" onclick="startGame()">Start / Reset game</button>
  </div>
</div>

<div class="page">
  <div id="winner-banner" class="winner-banner"></div>

  <!-- scoreboard + meld table -->
  <div class="scoreboard-wrap">
    <div class="scoreboard" id="scoreboard">
      <div class="empty-state"><div class="big">No game in progress</div>Set up players above and click Start</div>
    </div>
    <div class="meld-table-wrap" id="meld-table-wrap"></div>
  </div>

  <!-- entry area -->
  <div id="entry-area" style="display:none">
    <div class="entry-round-header" id="round-header">Round 1</div>
    <div class="entry-columns" id="entry-columns"></div>
  </div>
</div>

<script>
// ── meld brackets ────────────────────────────────────────────────────────────
const MELD_IND = [
  { label:'< 1,000',       min:-Infinity, max:1000,    meld:50  },
  { label:'1,000 – 1,999', min:1000,      max:2000,    meld:90  },
  { label:'2,000 – 2,999', min:2000,      max:3000,    meld:120 },
  { label:'3,000 – 3,999', min:3000,      max:4000,    meld:150 },
  { label:'4,000 – 4,999', min:4000,      max:5000,    meld:180 },
  { label:'5,000 – 5,999', min:5000,      max:6000,    meld:210 },
  { label:'≥ 6,000',       min:6000,      max:Infinity, meld:null, win:true }
];
const MELD_TEAM = [
  { label:'< 1,300',        min:-Infinity, max:1300,    meld:50  },
  { label:'1,300 – 2,499',  min:1300,      max:2500,    meld:90  },
  { label:'2,500 – 4,599',  min:2500,      max:4600,    meld:120 },
  { label:'4,600 – 7,499',  min:4600,      max:7500,    meld:150 },
  { label:'7,500 – 8,999',  min:7500,      max:9000,    meld:180 },
  { label:'9,000 – 9,999',  min:9000,      max:10000,   meld:210 },
  { label:'≥ 10,000',       min:10000,     max:Infinity, meld:null, win:true }
];
function getBrackets(isTeam) { return isTeam ? MELD_TEAM : MELD_IND; }
function getMeld(score, isTeam) {
  for (const b of getBrackets(isTeam)) if (score >= b.min && score < b.max) return b.win ? null : b.meld;
  return 210;
}
function isTeamMode(m) { return m === 'team2v2' || m === 'team3v3'; }

// ── game state ───────────────────────────────────────────────────────────────
// entities = score units (3 players OR 2 teams)
// players  = individuals, each with entityIdx pointing to their entity
let game = null;

function buildGame(mode, target) {
  const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  if (mode === 'ind3') {
    const names = [v('name-P1')||'Player 1', v('name-P2')||'Player 2', v('name-P3')||'Player 3'];
    const players = names.map((name, i) => ({ name, entityIdx: i }));
    const entities = names.map(name => ({ name }));
    return { mode, isTeam: false, target, players, entities, rounds: [], round: 1, submitted: [] };
  }
  if (mode === 'team2v2') {
    const players = [
      { name: v('name-T1P1')||'T1-P1', entityIdx: 0 },
      { name: v('name-T1P2')||'T1-P2', entityIdx: 0 },
      { name: v('name-T2P1')||'T2-P1', entityIdx: 1 },
      { name: v('name-T2P2')||'T2-P2', entityIdx: 1 },
    ];
    const entities = [
      { name: 'Team 1', players: [players[0].name, players[1].name] },
      { name: 'Team 2', players: [players[2].name, players[3].name] },
    ];
    return { mode, isTeam: true, target, players, entities, rounds: [], round: 1, submitted: [] };
  }
  if (mode === 'team3v3') {
    const players = [
      { name: v('name-T1P1')||'T1-P1', entityIdx: 0 },
      { name: v('name-T1P2')||'T1-P2', entityIdx: 0 },
      { name: v('name-T1P3')||'T1-P3', entityIdx: 0 },
      { name: v('name-T2P1')||'T2-P1', entityIdx: 1 },
      { name: v('name-T2P2')||'T2-P2', entityIdx: 1 },
      { name: v('name-T2P3')||'T2-P3', entityIdx: 1 },
    ];
    const entities = [
      { name: 'Team 1', players: [players[0].name, players[1].name, players[2].name] },
      { name: 'Team 2', players: [players[3].name, players[4].name, players[5].name] },
    ];
    return { mode, isTeam: true, target, players, entities, rounds: [], round: 1, submitted: [] };
  }
}

// ── helpers ───────────────────────────────────────────────────────────────────
function num(id) { const el = document.getElementById(id); return el ? (parseInt(el.value) || 0) : 0; }
function chk(id) { const el = document.getElementById(id); return el ? el.checked : false; }
function getTotals() {
  const t = game.entities.map(() => 0);
  for (const r of game.rounds) r.scores.forEach((s, i) => t[i] += s);
  return t;
}
function checkWinner(totals) {
  for (let i = 0; i < totals.length; i++) if (totals[i] >= game.target) return i;
  return -1;
}
function gridStyle(n) { return `grid-template-columns: 72px repeat(${n}, 1fr)`; }

// which player (by player index) has the "went out" checkbox ticked
function getOutPlayerIdx() {
  for (let i = 0; i < game.players.length; i++) if (chk(`out-${i}`)) return i;
  return -1;
}

// ── setup UI ──────────────────────────────────────────────────────────────────
function onModeChange() {
  const mode = document.getElementById('game-mode').value;
  document.getElementById('win-target').value = isTeamMode(mode) ? 10000 : 6000;
  renderPlayerNameInputs();
  highlightActiveLink(mode);
}
function highlightActiveLink(mode) {
  document.querySelectorAll('.game-link').forEach(a => a.classList.remove('active'));
  const map = { ind3:'link-ind3', team2v2:'link-team2v2', team3v3:'link-team3v3' };
  const el = document.getElementById(map[mode]);
  if (el) el.classList.add('active');
}
function renderPlayerNameInputs() {
  const mode = document.getElementById('game-mode').value;
  const container = document.getElementById('player-names-setup');
  container.innerHTML = '';
  const configs = {
    ind3:    [['P1','Player 1'],['P2','Player 2'],['P3','Player 3']],
    team2v2: [['T1P1','T1-P1'],['T1P2','T1-P2'],['T2P1','T2-P1'],['T2P2','T2-P2']],
    team3v3: [['T1P1','T1-P1'],['T1P2','T1-P2'],['T1P3','T1-P3'],['T2P1','T2-P1'],['T2P2','T2-P2'],['T2P3','T2-P3']]
  };
  for (const [id, placeholder] of configs[mode]) {
    const wrap = document.createElement('div');
    wrap.className = 'player-label';
    wrap.innerHTML = `<span>${placeholder}</span><input class="player-name-input" id="name-${id}" placeholder="${placeholder}" value="${placeholder}">`;
    container.appendChild(wrap);
  }
}

function startGame() {
  const mode = document.getElementById('game-mode').value;
  const target = parseInt(document.getElementById('win-target').value) || 6000;
  game = buildGame(mode, target);
  document.getElementById('winner-banner').classList.remove('visible');
  document.getElementById('entry-area').style.display = 'block';
  renderAll();
}

// ── scoreboard ────────────────────────────────────────────────────────────────
function renderScoreboard() {
  const { entities, rounds, isTeam } = game;
  const n = entities.length;
  let html = `<div class="scoreboard-header" style="${gridStyle(n)}">
    <div>Rd</div>
    ${entities.map(e => `<div style="text-align:right">${e.name}${e.players ? '<br><span style="font-size:0.62rem;opacity:0.55">'+e.players.join(' / ')+'</span>' : ''}</div>`).join('')}
  </div>`;
  if (rounds.length === 0) {
    html += `<div class="empty-state"><div class="big">No rounds yet</div>Enter round 1 below</div>`;
  } else {
    const totals = entities.map(() => 0);
    for (const r of rounds) {
      r.scores.forEach((s, i) => totals[i] += s);
      html += `<div class="score-row" style="${gridStyle(n)}">
        <div class="round-label">R${r.round}</div>
        ${r.scores.map(s => `<div class="score-val ${s < 0 ? 'negative' : ''}">${s >= 0 ? '+' : ''}${s}</div>`).join('')}
      </div>`;
    }
    const winner = checkWinner(totals);
    html += `<div class="score-row totals-row" style="${gridStyle(n)}">
      <div class="round-label" style="font-weight:500">Total</div>
      ${totals.map((t, i) => `<div class="score-val total ${t < 0 ? 'negative' : 'positive'} ${winner === i ? 'winner-col' : ''}">${t.toLocaleString()}</div>`).join('')}
    </div>`;
    html += `<div class="score-row meld-row" style="${gridStyle(n)}">
      <div class="round-label">Meld</div>
      ${totals.map(t => { const m = getMeld(t, isTeam); return `<div style="text-align:right"><span class="meld-badge">${m !== null ? '≥ '+m : '🏆 win'}</span></div>`; }).join('')}
    </div>`;
  }
  document.getElementById('scoreboard').innerHTML = html;
}

function renderMeldTable() {
  const { isTeam } = game;
  const brackets = getBrackets(isTeam);
  const maxScore = Math.max(...getTotals(), 0);
  let html = `<div class="meld-table-title">Meld thresholds — ${isTeam ? 'team' : 'individual'} game</div>
  <table class="meld-table"><thead><tr><th>Score range</th><th>Min. meld</th></tr></thead><tbody>`;
  for (const b of brackets) {
    const active = maxScore >= b.min && maxScore < b.max;
    html += `<tr class="${active ? 'active-row' : ''}"><td>${b.label}</td><td>${b.win ? '🏆 Win!' : b.meld+' pts'}</td></tr>`;
  }
  html += `</tbody></table>`;
  document.getElementById('meld-table-wrap').innerHTML = html;
}

// ── entry columns ─────────────────────────────────────────────────────────────
function renderEntryColumns() {
  const { entities, players, round, isTeam } = game;
  document.getElementById('round-header').textContent = `Round ${round}`;

  const cols = document.getElementById('entry-columns');
  const n = entities.length;
  cols.style.gridTemplateColumns = `repeat(${n}, 1fr)`;

  const outPi = getOutPlayerIdx();
  const outEntityIdx = outPi >= 0 ? players[outPi].entityIdx : -1;
  const totals = getTotals();

  cols.innerHTML = entities.map((e, ei) => {
    const isSubmitted = game.submitted.includes(ei);
    const curScore = totals[ei];
    const meld = getMeld(curScore, isTeam);

    // Who went out checkboxes — only players belonging to this entity
    const myPlayers = players.map((p, pi) => ({ ...p, pi })).filter(p => p.entityIdx === ei);
    const wentOutHtml = `<div class="went-out-section">
      <div class="col-section-label" style="color:var(--green-dark);margin-bottom:0.35rem">Who went out?</div>
      ${myPlayers.map(p => `<div class="win-row-check">
        <input type="checkbox" id="out-${p.pi}" ${isSubmitted ? 'disabled' : ''} onchange="onOutChange(${p.pi})">
        <label for="out-${p.pi}">${p.name}</label>
      </div>`).join('')}
    </div>`;

    // Positive cards
    const posHtml = `<div>
      <div class="col-section-label">Cards scored (+)</div>
      <div class="card-grid-2">
        <div class="cf"><label>Joker ×50</label><input type="number" min="0" value="0" id="pjoker-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
        <div class="cf"><label>2 / Ace ×20</label><input type="number" min="0" value="0" id="pwild-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
        <div class="cf"><label>K–10 ×10</label><input type="number" min="0" value="0" id="pface-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
        <div class="cf"><label>9–4 ×5</label><input type="number" min="0" value="0" id="plow-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
      </div>
    </div>`;

    // Books
    const booksHtml = `<div>
      <div class="col-section-label">Books</div>
      <div class="books-row">
        <div class="book-field red"><label>🔴 Red ×500</label><input type="number" min="0" value="0" id="rb-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
        <div class="book-field black"><label>⚫ Black ×300</label><input type="number" min="0" value="0" id="bb-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
      </div>
    </div>`;

    // Negative / leftover — always shown; hide for individual winner
    const isIndWinner = !isTeam && ei === outEntityIdx;
    const negHtml = isIndWinner
      ? `<div class="neg-block"><div class="col-section-label">Leftover (−)</div><div class="neg-gone-out">Went out — no leftover</div></div>`
      : `<div class="neg-block">
          <div class="col-section-label">Leftover (−)</div>
          <div class="card-grid-3">
            <div class="neg-cf"><label>Joker −50</label><input type="number" min="0" value="0" id="njoker-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
            <div class="neg-cf"><label>2/Ace −20</label><input type="number" min="0" value="0" id="nwild-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
            <div class="neg-cf"><label>K–10 −10</label><input type="number" min="0" value="0" id="nface-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
            <div class="neg-cf"><label>9–3 −5</label><input type="number" min="0" value="0" id="nlow-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
            <div class="neg-cf"><label>Red 3 −500</label><input type="number" min="0" value="0" id="nred3-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
            <div class="neg-cf"><label>Black 3 −5</label><input type="number" min="0" value="0" id="nblk3-${ei}" ${isSubmitted?'disabled':''} onchange="updateColPreview(${ei})"></div>
          </div>
        </div>`;

    // Preview
    const previewHtml = `<div class="col-preview" id="preview-${ei}">
      <div class="prev-total">—</div>
      <div class="prev-detail">Enter scores above</div>
    </div>`;

    // Save button
    const savedHtml = isSubmitted
      ? `<button class="btn btn-saved" style="width:100%" disabled>✓ Saved</button>`
      : `<button class="btn btn-success" style="width:100%" onclick="commitEntity(${ei})">✓ Save — ${e.name}</button>`;

    // Running score footer
    const footerHtml = `<div style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--text-muted);text-align:center;padding-top:0.25rem">
      Running: ${curScore.toLocaleString()} pts &nbsp;·&nbsp; meld ≥ ${meld !== null ? meld : '–'}
    </div>`;

    return `<div class="entity-col">
      <div class="entity-col-header">
        ${e.name}
        ${e.players ? `<div class="col-players">${e.players.join(' · ')}</div>` : ''}
      </div>
      <div class="entity-col-body">
        ${wentOutHtml}
        ${booksHtml}
        ${posHtml}
        ${negHtml}
        ${previewHtml}
        <div style="margin-top:auto;display:flex;flex-direction:column;gap:0.4rem">
          ${savedHtml}
          ${footerHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── out change — enforce single winner across all columns ─────────────────────
function onOutChange(clickedPi) {
  game.players.forEach((_, pi) => {
    if (pi !== clickedPi) { const el = document.getElementById(`out-${pi}`); if (el) el.checked = false; }
  });
  // Re-render columns so individual neg section toggling works
  renderEntryColumns();
  // Restore all preview values
  game.entities.forEach((_, ei) => updateColPreview(ei));
}

// ── per-column score preview ──────────────────────────────────────────────────
function calcEntityScore(ei) {
  const outPi = getOutPlayerIdx();
  const outEntityIdx = outPi >= 0 ? game.players[outPi].entityIdx : -1;
  const isIndWinner = !game.isTeam && ei === outEntityIdx;

  const rb  = num(`rb-${ei}`);
  const bb  = num(`bb-${ei}`);
  const win = (outPi >= 0 && game.players[outPi].entityIdx === ei) ? 100 : 0;
  const pos = num(`pjoker-${ei}`) * 50 + num(`pwild-${ei}`) * 20
            + num(`pface-${ei}`)  * 10 + num(`plow-${ei}`)  * 5;
  const neg = isIndWinner ? 0
    : -(num(`njoker-${ei}`) * 50 + num(`nwild-${ei}`)  * 20
      + num(`nface-${ei}`)  * 10 + num(`nlow-${ei}`)   * 5
      + num(`nred3-${ei}`)  * 500 + num(`nblk3-${ei}`) * 5);
  const books = rb * 500 + bb * 300;
  return { books, win, pos, neg, total: books + win + pos + neg };
}

function updateColPreview(ei) {
  const el = document.getElementById(`preview-${ei}`);
  if (!el) return;
  const s = calcEntityScore(ei);
  const totals = getTotals();
  const after = totals[ei] + s.total;
  const color = s.total < 0 ? 'var(--red)' : 'var(--green-dark)';
  el.innerHTML = `<div class="prev-total" style="color:${color}">${s.total >= 0 ? '+' : ''}${s.total} &nbsp;<span style="font-size:0.72rem;color:var(--text-muted);font-weight:400">→ ${after.toLocaleString()}</span></div>
    <div class="prev-detail">${s.books} bks · ${s.win} win · +${s.pos} cards · ${s.neg} left</div>`;
}

// ── commit per entity ─────────────────────────────────────────────────────────
function commitEntity(ei) {
  if (game.submitted.includes(ei)) return;
  game.submitted.push(ei);

  if (game.submitted.length === game.entities.length) {
    // All submitted — finalise round
    const scores = game.entities.map((_, i) => calcEntityScore(i).total);
    game.rounds.push({ round: game.round, scores });
    game.round++;
    game.submitted = [];

    const totals = getTotals();
    const winner = checkWinner(totals);
    if (winner >= 0) {
      const banner = document.getElementById('winner-banner');
      banner.textContent = `🎉 ${game.entities[winner].name} wins with ${totals[winner].toLocaleString()} points!`;
      banner.classList.add('visible');
      document.getElementById('entry-area').style.display = 'none';
    } else {
      renderEntryColumns();
    }
    renderScoreboard();
    renderMeldTable();
    window.scrollTo(0, 0);
  } else {
    // Just re-render columns to grey out the saved one
    renderEntryColumns();
    game.entities.forEach((_, i) => updateColPreview(i));
  }
}

// ── full render ───────────────────────────────────────────────────────────────
function renderAll() {
  renderScoreboard();
  renderMeldTable();
  renderEntryColumns();
}

function renderPlayerNameInputs() {
  const mode = document.getElementById('game-mode').value;
  const container = document.getElementById('player-names-setup');
  container.innerHTML = '';
  const configs = {
    ind3:    [['P1','Player 1'],['P2','Player 2'],['P3','Player 3']],
    team2v2: [['T1P1','T1-P1'],['T1P2','T1-P2'],['T2P1','T2-P1'],['T2P2','T2-P2']],
    team3v3: [['T1P1','T1-P1'],['T1P2','T1-P2'],['T1P3','T1-P3'],['T2P1','T2-P1'],['T2P2','T2-P2'],['T2P3','T2-P3']]
  };
  for (const [id, placeholder] of configs[mode]) {
    const wrap = document.createElement('div');
    wrap.className = 'player-label';
    wrap.innerHTML = `<span>${placeholder}</span><input class="player-name-input" id="name-${id}" placeholder="${placeholder}" value="${placeholder}">`;
    container.appendChild(wrap);
  }
}

renderPlayerNameInputs();
highlightActiveLink('ind3');
</script>
