<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boots & Gloves — Score Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b; --red-light: #fdecea; --red-dark: #922b21;
    --black: #1a1a2e; --black-light: #eaeaf2; --black-dark: #0d0d1a;
    --gold: #d4a017; --gold-light: #fdf6e3; --gold-dark: #9a7410;
    --green: #1a6b3a; --green-light: #e8f5ee; --green-dark: #0f3d21;
    --bg: #f7f5f0; --surface: #ffffff; --border: #e0ddd5;
    --text: #1a1a2e; --text-muted: #6b6b80; --text-light: #9999aa;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--black); color: white; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); }
  header p { font-size: 0.75rem; color: #aaa; font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
  .header-links { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .game-link { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: #ccc; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 5px; padding: 4px 10px; text-decoration: none; transition: background 0.15s; white-space: nowrap; }
  .game-link:hover { background: rgba(255,255,255,0.16); color: var(--gold); }
  .game-link.active { background: rgba(212,160,23,0.18); border-color: var(--gold); color: var(--gold); }

  .setup-panel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.1rem 2rem; display: flex; gap: 1.5rem; align-items: flex-end; flex-wrap: wrap; }
  .setup-panel label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  .setup-panel select, .setup-panel input[type=number] { font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; background: var(--bg); color: var(--text); outline: none; }
  .setup-panel select:focus, .setup-panel input:focus { border-color: var(--gold); }
  .btn { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.85rem; font-weight: 500; padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--black); color: var(--gold); }
  .btn-primary:hover { background: var(--black-dark); }
  .btn-success { background: var(--green-light); color: var(--green-dark); border: 1px solid #b8dfc8; }
  .btn-success:hover { background: #c8e9d6; }

  .main { padding: 1.5rem 2rem; display: grid; grid-template-columns: 1fr 400px; gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
  @media(max-width: 960px) { .main { grid-template-columns: 1fr; padding: 1rem; } .setup-panel { padding: 1rem; gap: 1rem; } header { padding: 1rem; } }

  .scoreboard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
  .scoreboard-header { display: grid; background: var(--black); color: white; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; padding: 0.6rem 1rem; }
  .score-row { display: grid; padding: 0.55rem 1rem; border-bottom: 1px solid var(--border); align-items: center; font-size: 0.85rem; }
  .score-row:last-child { border-bottom: none; }
  .score-row.totals-row { background: var(--gold-light); font-family: 'IBM Plex Mono', monospace; font-weight: 500; border-top: 2px solid var(--gold); }
  .score-row.meld-row { background: #fafaf8; }
  .round-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--text-muted); }
  .score-val { font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; text-align: right; }
  .score-val.negative { color: var(--red); }
  .score-val.positive { color: var(--green); }
  .score-val.total { font-size: 0.95rem; font-weight: 500; }
  .score-val.winner-col { background: var(--green-light); border-radius: 4px; padding: 1px 4px; }
  .meld-badge { font-size: 0.68rem; font-family: 'IBM Plex Mono', monospace; background: var(--gold-light); color: var(--gold-dark); border: 1px solid #e8cc7a; border-radius: 4px; padding: 1px 6px; display: inline-block; }

  .meld-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .meld-table-title { background: var(--black); color: var(--gold); font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; padding: 0.5rem 1rem; letter-spacing: 0.05em; text-transform: uppercase; }
  .meld-table { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; }
  .meld-table th { background: #f0ede6; color: var(--text-muted); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 5px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .meld-table td { padding: 5px 10px; border-bottom: 1px solid var(--border); }
  .meld-table tr:last-child td { border-bottom: none; }
  .meld-table tr.active-row td { background: var(--gold-light); font-weight: 500; color: var(--gold-dark); }

  .entry-panel { display: flex; flex-direction: column; gap: 1rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--text); margin-bottom: 0.9rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between; }
  .card-title span { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--text-muted); font-weight: 400; }

  .section-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; font-weight: 500; }
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 0.8rem 0; }

  /* books */
  .books-section { display: flex; gap: 0.75rem; margin-bottom: 0.9rem; }
  .book-col { flex: 1; }
  .book-col-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; margin-bottom: 5px; display: block; }
  .book-col.red .book-col-label { color: var(--red-dark); }
  .book-col.black .book-col-label { color: #333; }
  .book-entity-row { margin-bottom: 4px; }
  .book-entity-row span { font-size: 0.68rem; display: block; margin-bottom: 2px; }
  .book-col.red .book-entity-row span { color: var(--red-dark); }
  .book-col.black .book-entity-row span { color: #555; }
  .book-col.red input { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; border: 2px solid var(--red); border-radius: 6px; padding: 5px 7px; background: var(--red-light); color: var(--red-dark); outline: none; }
  .book-col.black input { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; border: 2px solid #555; border-radius: 6px; padding: 5px 7px; background: var(--black-light); color: #111; outline: none; }

  /* win round */
  .win-row-check { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .win-row-check input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--green); cursor: pointer; }
  .win-row-check label { font-size: 0.83rem; cursor: pointer; }

  /* card grids — positive and negative share same layout */
  .entity-card-block { margin-bottom: 0.75rem; }
  .entity-card-block-label { font-size: 0.72rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .card-entry label { font-size: 0.65rem; color: var(--text-muted); display: block; margin-bottom: 2px; }
  .card-entry input { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 5px; padding: 4px 6px; background: var(--bg); outline: none; }
  .card-entry input:focus { border-color: var(--gold); }
  .card-entry.danger label { color: var(--red); }
  .card-entry.danger input { border-color: #f5c6c2; background: var(--red-light); }

  /* negative cards section */
  .neg-section { background: #fff8f7; border: 1px solid #f5c6c2; border-radius: 8px; padding: 0.8rem; margin-bottom: 0.9rem; }
  .neg-section-title { font-size: 0.72rem; color: var(--red-dark); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 6px; }
  .neg-section-subtitle { font-size: 0.68rem; color: #b07070; margin-bottom: 0.6rem; font-style: italic; }
  .neg-entity-block { margin-bottom: 0.6rem; }
  .neg-entity-block:last-child { margin-bottom: 0; }
  .neg-entity-label { font-size: 0.7rem; font-weight: 500; color: var(--red-dark); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .neg-cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .neg-card-entry label { font-size: 0.62rem; color: #b07070; display: block; margin-bottom: 2px; }
  .neg-card-entry input { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; border: 1px solid #f5c6c2; border-radius: 5px; padding: 4px 6px; background: #fff3f2; color: var(--red-dark); outline: none; }
  .neg-card-entry input:focus { border-color: var(--red); background: var(--red-light); }

  /* round summary */
  .round-summary { background: var(--gold-light); border: 1px solid #e8cc7a; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.9rem; }
  .round-summary-title { font-size: 0.68rem; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
  .rs-row { display: flex; justify-content: space-between; align-items: baseline; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; margin-bottom: 3px; flex-wrap: wrap; gap: 2px; }
  .rs-row .rs-label { color: var(--text-muted); }
  .rs-row .rs-val { font-weight: 500; }
  .rs-breakdown { font-size: 0.65rem; color: var(--text-muted); font-weight: 400; margin-left: 4px; }

  /* status bar */
  .status-bar { display: flex; flex-wrap: wrap; gap: 0.6rem; }
  .status-item { flex: 1; min-width: 80px; background: var(--black-light); border-radius: 7px; padding: 0.6rem 0.75rem; }
  .status-item .s-name { font-size: 0.72rem; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .status-item .s-score { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: var(--text); }
  .status-item .s-meld { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--gold-dark); margin-top: 2px; }

  .winner-banner { display: none; background: var(--green); color: white; text-align: center; padding: 1.5rem; border-radius: var(--radius); font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 1rem; }
  .winner-banner.visible { display: block; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.88rem; }
  .empty-state .big { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--text-light); margin-bottom: 0.4rem; }

  .player-setup { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .player-label { display: flex; flex-direction: column; gap: 2px; }
  .player-label span { font-size: 0.68rem; color: var(--text-muted); }
  .player-name-input { font-family: 'IBM Plex Mono', monospace; font-size: 0.83rem; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; width: 115px; background: var(--bg); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Boots &amp; Gloves</h1>
    <p>score card</p>
  </div>
  <div class="header-links">
    <span style="font-size:0.7rem;color:#888;font-family:'IBM Plex Mono',monospace">Play online →</span>
    <a class="game-link" href="https://playingcards.io/dferem" target="_blank" id="link-ind3">Individual 3P</a>
    <a class="game-link" href="https://playingcards.io/utv8e9" target="_blank" id="link-team2v2">Team 2v2</a>
    <a class="game-link" href="https://playingcards.io/xv2w4e" target="_blank" id="link-team3v3">Team 3v3</a>
  </div>
</header>

<div class="setup-panel">
  <div>
    <label>Game mode</label>
    <select id="game-mode" onchange="onModeChange()">
      <option value="ind3">Individual — 3 players</option>
      <option value="team2v2">Team — 2 v 2</option>
      <option value="team3v3">Team — 3 v 3</option>
    </select>
  </div>
  <div id="player-names-setup" class="player-setup"></div>
  <div>
    <label>Win target (pts)</label>
    <input type="number" id="win-target" value="6000" step="500" min="1000" style="width:110px">
  </div>
  <div>
    <button class="btn btn-primary" onclick="startGame()">Start / Reset game</button>
  </div>
</div>

<div class="main">
  <div>
    <div id="winner-banner" class="winner-banner"></div>
    <div class="scoreboard" id="scoreboard">
      <div class="empty-state"><div class="big">No game in progress</div>Set up players above and click Start</div>
    </div>
    <div class="meld-table-wrap" id="meld-table-wrap"></div>
  </div>

  <div class="entry-panel" id="entry-panel" style="display:none">
    <div class="card">
      <div class="card-title">Round <span id="round-number-label">1</span></div>

      <!-- Books -->
      <div class="section-label">Books made</div>
      <div class="books-section" id="books-section"></div>

      <hr class="section-divider">

      <!-- Round winner -->
      <div class="section-label">Round winner</div>
      <div style="margin-bottom:0.8rem" id="win-round-section"></div>

      <hr class="section-divider">

      <!-- Positive card points (winner + everyone) -->
      <div class="section-label">Cards scored (positive)</div>
      <div style="margin-bottom:0.5rem;font-size:0.7rem;color:var(--text-muted);font-style:italic">Cards melded or played by each player / team</div>
      <div style="margin-bottom:0.8rem" id="card-points-section"></div>

      <hr class="section-divider">

      <!-- Negative leftover cards -->
      <div id="neg-cards-section"></div>

      <!-- Round summary -->
      <div class="round-summary" id="round-summary"></div>
      <button class="btn btn-success" style="width:100%" onclick="commitRound()">✓ Save round</button>
    </div>

    <div class="card" style="padding:1rem">
      <div class="card-title" style="margin-bottom:0.8rem">Running totals <span>before this round</span></div>
      <div class="status-bar" id="status-bar"></div>
    </div>
  </div>
</div>

<script>
const MELD_IND = [
  { label: '< 1,000',       min: -Infinity, max: 1000,    meld: 50  },
  { label: '1,000 – 1,999', min: 1000,      max: 2000,    meld: 90  },
  { label: '2,000 – 2,999', min: 2000,      max: 3000,    meld: 120 },
  { label: '3,000 – 3,999', min: 3000,      max: 4000,    meld: 150 },
  { label: '4,000 – 4,999', min: 4000,      max: 5000,    meld: 180 },
  { label: '5,000 – 5,999', min: 5000,      max: 6000,    meld: 210 },
  { label: '≥ 6,000',       min: 6000,      max: Infinity, meld: null, win: true }
];
const MELD_TEAM = [
  { label: '< 1,300',        min: -Infinity, max: 1300,    meld: 50  },
  { label: '1,300 – 2,499',  min: 1300,      max: 2500,    meld: 90  },
  { label: '2,500 – 4,599',  min: 2500,      max: 4600,    meld: 120 },
  { label: '4,600 – 7,499',  min: 4600,      max: 7500,    meld: 150 },
  { label: '7,500 – 8,999',  min: 7500,      max: 9000,    meld: 180 },
  { label: '9,000 – 9,999',  min: 9000,      max: 10000,   meld: 210 },
  { label: '≥ 10,000',       min: 10000,     max: Infinity, meld: null, win: true }
];

function getBrackets(isTeam) { return isTeam ? MELD_TEAM : MELD_IND; }
function getMeld(score, isTeam) {
  for (const b of getBrackets(isTeam)) if (score >= b.min && score < b.max) return b.win ? null : b.meld;
  return 210;
}
function isTeamMode(m) { return m === 'team2v2' || m === 'team3v3'; }

let game = null;

function onModeChange() {
  const mode = document.getElementById('game-mode').value;
  document.getElementById('win-target').value = isTeamMode(mode) ? 10000 : 6000;
  renderPlayerNameInputs();
  highlightActiveLink(mode);
}

function highlightActiveLink(mode) {
  document.querySelectorAll('.game-link').forEach(a => a.classList.remove('active'));
  const map = { ind3: 'link-ind3', team2v2: 'link-team2v2', team3v3: 'link-team3v3' };
  const el = document.getElementById(map[mode]);
  if (el) el.classList.add('active');
}

function renderPlayerNameInputs() {
  const mode = document.getElementById('game-mode').value;
  const container = document.getElementById('player-names-setup');
  container.innerHTML = '';
  const configs = {
    ind3:    [['P1','Player 1'],['P2','Player 2'],['P3','Player 3']],
    team2v2: [['T1P1','T1-P1'],['T1P2','T1-P2'],['T2P1','T2-P1'],['T2P2','T2-P2']],
    team3v3: [['T1P1','T1-P1'],['T1P2','T1-P2'],['T1P3','T1-P3'],['T2P1','T2-P1'],['T2P2','T2-P2'],['T2P3','T2-P3']]
  };
  for (const [id, placeholder] of configs[mode]) {
    const wrap = document.createElement('div');
    wrap.className = 'player-label';
    wrap.innerHTML = `<span>${placeholder}</span><input class="player-name-input" id="name-${id}" placeholder="${placeholder}" value="${placeholder}">`;
    container.appendChild(wrap);
  }
}

function getEntities(mode) {
  const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  if (mode === 'ind3') return [
    { id:'P1', name: v('name-P1')||'Player 1' },
    { id:'P2', name: v('name-P2')||'Player 2' },
    { id:'P3', name: v('name-P3')||'Player 3' }
  ];
  if (mode === 'team2v2') return [
    { id:'T1', name:'Team 1', players:[v('name-T1P1')||'T1-P1', v('name-T1P2')||'T1-P2'] },
    { id:'T2', name:'Team 2', players:[v('name-T2P1')||'T2-P1', v('name-T2P2')||'T2-P2'] }
  ];
  if (mode === 'team3v3') return [
    { id:'T1', name:'Team 1', players:[v('name-T1P1')||'T1-P1', v('name-T1P2')||'T1-P2', v('name-T1P3')||'T1-P3'] },
    { id:'T2', name:'Team 2', players:[v('name-T2P1')||'T2-P1', v('name-T2P2')||'T2-P2', v('name-T2P3')||'T2-P3'] }
  ];
}

function num(id) { return parseInt(document.getElementById(id)?.value) || 0; }
function chk(id) { return document.getElementById(id)?.checked || false; }
function getTotals() {
  const t = game.entities.map(() => 0);
  for (const r of game.rounds) r.scores.forEach((s,i) => t[i] += s);
  return t;
}
function checkWinner(totals) {
  for (let i = 0; i < totals.length; i++) if (totals[i] >= game.target) return i;
  return -1;
}
function gridStyle(n) { return `grid-template-columns: 72px repeat(${n}, 1fr)`; }

function startGame() {
  const mode = document.getElementById('game-mode').value;
  const target = parseInt(document.getElementById('win-target').value) || 6000;
  game = { mode, isTeam: isTeamMode(mode), target, entities: getEntities(mode), rounds: [], round: 1 };
  document.getElementById('winner-banner').classList.remove('visible');
  document.getElementById('entry-panel').style.display = 'flex';
  renderAll();
}

function renderScoreboard() {
  const { entities, rounds, isTeam } = game;
  const n = entities.length;
  let html = `<div class="scoreboard-header" style="${gridStyle(n)}">
    <div>Rd</div>
    ${entities.map(e => `<div style="text-align:right">${e.name}${e.players ? '<br><span style="font-size:0.62rem;opacity:0.55">'+e.players.join(' / ')+'</span>' : ''}</div>`).join('')}
  </div>`;

  if (rounds.length === 0) {
    html += `<div class="empty-state"><div class="big">No rounds yet</div>Enter round 1 on the right</div>`;
  } else {
    const totals = entities.map(() => 0);
    for (const r of rounds) {
      r.scores.forEach((s,i) => totals[i] += s);
      html += `<div class="score-row" style="${gridStyle(n)}">
        <div class="round-label">R${r.round}</div>
        ${r.scores.map(s => `<div class="score-val ${s<0?'negative':''}">${s>=0?'+':''}${s}</div>`).join('')}
      </div>`;
    }
    const winner = checkWinner(totals);
    html += `<div class="score-row totals-row" style="${gridStyle(n)}">
      <div class="round-label" style="font-weight:500">Total</div>
      ${totals.map((t,i) => `<div class="score-val total ${t<0?'negative':'positive'} ${winner===i?'winner-col':''}">${t.toLocaleString()}</div>`).join('')}
    </div>`;
    html += `<div class="score-row meld-row" style="${gridStyle(n)}">
      <div class="round-label">Meld</div>
      ${totals.map(t => { const m=getMeld(t,isTeam); return `<div style="text-align:right"><span class="meld-badge">${m!==null?'≥ '+m:'🏆 win'}</span></div>`; }).join('')}
    </div>`;
  }
  document.getElementById('scoreboard').innerHTML = html;
}

function renderMeldTable() {
  const { isTeam } = game;
  const brackets = getBrackets(isTeam);
  const maxScore = Math.max(...getTotals(), 0);
  let html = `<div class="meld-table-title">Meld thresholds — ${isTeam?'team':'individual'} game</div>
  <table class="meld-table"><thead><tr><th>Score range</th><th>Min. meld</th></tr></thead><tbody>`;
  for (const b of brackets) {
    const active = maxScore >= b.min && maxScore < b.max;
    html += `<tr class="${active?'active-row':''}"><td>${b.label}</td><td>${b.win?'🏆 Win!':b.meld+' pts'}</td></tr>`;
  }
  html += `</tbody></table>`;
  document.getElementById('meld-table-wrap').innerHTML = html;
}

/* ── card input helpers ── */
function cardPointsHtml(prefix, entities, winnerIdx) {
  return entities.map((e, i) => {
    const skip = winnerIdx === i;
    if (skip) return '';
    return `<div class="entity-card-block">
      <div class="entity-card-block-label">${e.name}</div>
      <div class="cards-grid">
        <div class="card-entry"><label>Joker ×50</label><input type="number" min="0" value="0" id="${prefix}joker-${i}" onchange="updateRoundSummary()"></div>
        <div class="card-entry"><label>2 / Ace ×20</label><input type="number" min="0" value="0" id="${prefix}wild-${i}" onchange="updateRoundSummary()"></div>
        <div class="card-entry"><label>K–10 ×10</label><input type="number" min="0" value="0" id="${prefix}face-${i}" onchange="updateRoundSummary()"></div>
        <div class="card-entry"><label>9–4 ×5</label><input type="number" min="0" value="0" id="${prefix}low-${i}" onchange="updateRoundSummary()"></div>
        <div class="card-entry danger"><label>Red 3 −500</label><input type="number" min="0" value="0" id="${prefix}red3-${i}" onchange="updateRoundSummary()"></div>
        <div class="card-entry"><label>Black 3 (0)</label><input type="number" min="0" value="0" id="${prefix}blk3-${i}"></div>
      </div>
    </div>`;
  }).join('');
}

function calcCards(prefix, i) {
  return num(`${prefix}joker-${i}`) * 50
       + num(`${prefix}wild-${i}`)  * 20
       + num(`${prefix}face-${i}`)  * 10
       + num(`${prefix}low-${i}`)   * 5
       + num(`${prefix}red3-${i}`)  * -500;
}

function getWinnerIdx() {
  for (let i = 0; i < game.entities.length; i++) if (chk(`win-${i}`)) return i;
  return -1;
}

function renderEntryPanel() {
  const { entities, round, isTeam } = game;
  document.getElementById('round-number-label').textContent = round;

  // Books
  let booksHtml = `<div class="book-col red"><span class="book-col-label">🔴 Red books (×500)</span>`;
  entities.forEach((e,i) => booksHtml += `<div class="book-entity-row"><span>${e.name}</span><input type="number" min="0" value="0" id="rb-${i}" onchange="updateRoundSummary()"></div>`);
  booksHtml += `</div><div class="book-col black"><span class="book-col-label">⚫ Black books (×300)</span>`;
  entities.forEach((e,i) => booksHtml += `<div class="book-entity-row"><span>${e.name}</span><input type="number" min="0" value="0" id="bb-${i}" onchange="updateRoundSummary()"></div>`);
  booksHtml += `</div>`;
  document.getElementById('books-section').innerHTML = booksHtml;

  // Win round — selecting winner refreshes neg cards section
  let winHtml = '';
  entities.forEach((e,i) => winHtml += `<div class="win-row-check">
    <input type="checkbox" id="win-${i}" onchange="onWinnerChange(${i})">
    <label for="win-${i}">🏆 ${e.name} went out</label>
  </div>`);
  document.getElementById('win-round-section').innerHTML = winHtml;

  // Positive card points (all players)
  document.getElementById('card-points-section').innerHTML = cardPointsHtml('p', entities, -1);

  // Negative leftover section (rendered fresh on winner change)
  renderNegSection(-1);

  updateRoundSummary();
}

function onWinnerChange(clickedIdx) {
  // only one winner — uncheck others
  game.entities.forEach((_, i) => {
    if (i !== clickedIdx) { const el = document.getElementById(`win-${i}`); if (el) el.checked = false; }
  });
  renderNegSection(clickedIdx);
  updateRoundSummary();
}

function renderNegSection(winnerIdx) {
  const { entities } = game;
  const losers = entities.filter((_, i) => i !== winnerIdx);
  const wrap = document.getElementById('neg-cards-section');

  if (winnerIdx < 0 || losers.length === 0) {
    wrap.innerHTML = `<div class="neg-section">
      <div class="neg-section-title">⚠ Leftover cards (negative)</div>
      <div class="neg-section-subtitle">Select who went out above — leftover fields for the other players will appear here.</div>
    </div>`;
    return;
  }

  let html = `<div class="neg-section">
    <div class="neg-section-title">⚠ Leftover cards (negative)</div>
    <div class="neg-section-subtitle">Cards still in boot / glove for everyone except ${entities[winnerIdx].name}. Same values, counted as negative.</div>`;
  entities.forEach((e, i) => {
    if (i === winnerIdx) return;
    html += `<div class="neg-entity-block">
      <div class="neg-entity-label">${e.name} — leftover</div>
      <div class="neg-cards-grid">
        <div class="neg-card-entry"><label>Joker (−50)</label><input type="number" min="0" value="0" id="njoker-${i}" onchange="updateRoundSummary()"></div>
        <div class="neg-card-entry"><label>2 / Ace (−20)</label><input type="number" min="0" value="0" id="nwild-${i}" onchange="updateRoundSummary()"></div>
        <div class="neg-card-entry"><label>K–10 (−10)</label><input type="number" min="0" value="0" id="nface-${i}" onchange="updateRoundSummary()"></div>
        <div class="neg-card-entry"><label>9–4 (−5)</label><input type="number" min="0" value="0" id="nlow-${i}" onchange="updateRoundSummary()"></div>
        <div class="neg-card-entry"><label>Red 3 (−500)</label><input type="number" min="0" value="0" id="nred3-${i}" onchange="updateRoundSummary()"></div>
        <div class="neg-card-entry"><label>Black 3 (0)</label><input type="number" min="0" value="0" id="nblk3-${i}"></div>
      </div>
    </div>`;
  });
  html += `</div><hr class="section-divider">`;
  wrap.innerHTML = html;
}

function calcNegCards(i) {
  return -(num(`njoker-${i}`) * 50
         + num(`nwild-${i}`)  * 20
         + num(`nface-${i}`)  * 10
         + num(`nlow-${i}`)   * 5
         + num(`nred3-${i}`)  * 500);
}

function calcRoundScores() {
  const { entities, isTeam } = game;
  const winnerIdx = getWinnerIdx();

  // For team games, aggregate per-player negatives into the right team entity
  // Entity index in team mode = 0 (Team1) or 1 (Team2)
  // players within each team are sub-players; entity itself has the score slot
  return entities.map((e, i) => {
    const rb    = num(`rb-${i}`);
    const bb    = num(`bb-${i}`);
    const win   = chk(`win-${i}`) ? 100 : 0;
    const posCards = calcCards('p', i);
    const negCards = (winnerIdx >= 0 && i !== winnerIdx) ? calcNegCards(i) : 0;
    const books = rb * 500 + bb * 300;
    const total = books + win + posCards + negCards;
    return { books, win, posCards, negCards, total };
  });
}

function updateRoundSummary() {
  const scores = calcRoundScores();
  const totals = getTotals();
  const winnerIdx = getWinnerIdx();
  let html = `<div class="round-summary-title">Round preview</div>`;
  scores.forEach((s, i) => {
    const after = totals[i] + s.total;
    const negPart = s.negCards !== 0 ? ` <span style="color:var(--red)">${s.negCards} left</span>` : '';
    html += `<div class="rs-row">
      <span class="rs-label">${game.entities[i].name}${i === winnerIdx ? ' 🏆' : ''}</span>
      <span class="rs-val" style="color:${s.total<0?'var(--red)':'var(--green-dark)'}">
        ${s.total>=0?'+':''}${s.total}
        <span class="rs-breakdown">${s.books} bks · ${s.win} win · ${s.posCards} cards${negPart} → ${after.toLocaleString()}</span>
      </span>
    </div>`;
  });
  document.getElementById('round-summary').innerHTML = html;
  renderStatusBar(scores);
}

function renderStatusBar(previewScores) {
  const { entities, isTeam, target } = game;
  const totals = getTotals();
  let html = '';
  entities.forEach((e, i) => {
    const cur = totals[i];
    const meld = getMeld(cur, isTeam);
    const preview = previewScores ? cur + previewScores[i].total : null;
    html += `<div class="status-item">
      <div class="s-name">${e.name}</div>
      <div class="s-score">${cur.toLocaleString()}${preview !== null ? ' <span style="font-size:0.8rem;color:var(--text-muted)">→ '+preview.toLocaleString()+'</span>' : ''}</div>
      <div class="s-meld">meld ≥ ${meld!==null?meld:'–'} · win at ${target.toLocaleString()}</div>
    </div>`;
  });
  document.getElementById('status-bar').innerHTML = html;
}

function commitRound() {
  const scores = calcRoundScores();
  game.rounds.push({ round: game.round, scores: scores.map(s => s.total) });
  game.round++;
  const totals = getTotals();
  const winner = checkWinner(totals);
  if (winner >= 0) {
    const banner = document.getElementById('winner-banner');
    banner.textContent = `🎉 ${game.entities[winner].name} wins with ${totals[winner].toLocaleString()} points!`;
    banner.classList.add('visible');
    document.getElementById('entry-panel').style.display = 'none';
  } else {
    renderEntryPanel();
  }
  renderScoreboard();
  renderMeldTable();
  window.scrollTo(0, 0);
}

function renderAll() {
  renderScoreboard();
  renderMeldTable();
  renderEntryPanel();
  renderStatusBar();
}

renderPlayerNameInputs();
highlightActiveLink('ind3');
</script>
</body>
</html>
